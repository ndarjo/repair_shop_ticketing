{% extends "base.html" %}

{% block title %}Edit User - Repair Shop{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4>Edit User: {{ user.username }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="full_name" class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="full_name" name="full_name" value="{{ user.full_name }}">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-check-label">
                            <input class="form-check-input" type="checkbox" name="is_active" {% if user.is_active %}checked{% endif %}>
                            Account Active
                        </label>
                    </div>

                    <h5 class="mt-4 mb-3">Assign Roles</h5>
                    <div class="mb-3">
                        {% for role in roles %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="role_{{ role.id }}" name="roles" value="{{ role.id }}" {% if role in user.role %}checked{% endif %}>
                            <label class="form-check-label" for="role_{{ role.id }}">
                                {{ role.name }} - {{ role.description }}
                            </label>
                        </div>
                        {% endfor %}
                    </div>

                    <h5 class="mt-4 mb-3">Assign Permissions</h5>
                    <div class="mb-3">
                        {% for permission in all_permissions %}
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="perm_{{ permission.id }}" name="permissions" value="{{ permission.id }}" {% if permission in user.permissions %}checked{% endif %}>
                            <label class="form-check-label" for="perm_{{ permission.id }}">
                                {{ permission.name }}
                                <small class="text-muted">({{ permission.category }})</small>
                            </label>
                        </div>
                        {% endfor %}
                    </div>

                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                        <a href="{{ url_for('admin.manage_users') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
