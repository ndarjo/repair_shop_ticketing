{% extends "base.html" %}
{% block title %}System Backups - Admin{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h2 class="mb-4">System Backups</h2>
        <p class="text-muted">Manage your application's data backups.</p>

        <div class="card mb-4">
            <div class="card-header">
                <h5>Create New Backup</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Select Backup Type:</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="backup_type" id="json_data_backup" value="json_data" checked>
                            <label class="form-check-label" for="json_data_backup">
                                **Logical Data Backup (JSON)**: Exports selected customer and ticket data. (Human-readable, good for migration)
                            </label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="backup_type" id="full_db_backup" value="full_db">
                            <label class="form-check-label" for="full_db_backup">
                                **Full Database Backup (.db)**: Exports the entire SQLite database file. (Complete snapshot, easier to restore)
                            </label>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">Download Backup</button>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><h5>Restore from Backup</h5></div>
            <div class="card-body">
                <p class="text-muted">Upload a <strong>.db</strong> file for a full system restore or a <strong>.json</strong> file to import data records.</p>
                <form action="{{ url_for('admin.restore') }}" method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <input class="form-control" type="file" name="backup_file" accept=".json,.db" required>
                    </div>
                    <button type="submit" class="btn btn-warning" onclick="return confirm('WARNING: Restoring from a .db file will overwrite all current data. Are you sure?');">Upload & Restore</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
