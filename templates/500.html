{% extends "base.html" %}
{% block title %}{{ _('System Error') }}{% endblock %}
{% block content %}
<div class="container text-center py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="display-1 text-danger">500</h1>
            <h2 class="mb-4">{{ _('Internal Server Error') }}</h2>
            <p class="lead mb-5">{{ _('Something went wrong on our end. The administrators have been notified. Please try again later.') }}</p>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg">{{ _('Back to Dashboard') }}</a>
        </div>
    </div>
</div>
{% endblock %}
