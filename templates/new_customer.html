{% extends "base.html" %}

{% block title %}{{ _('New Customer - Repair Shop') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 offset-md-3">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{{ _('Add New Customer') }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Full Name') }} *</label>
                        <input type="text" name="name" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Phone Number') }} *</label>
                        <input type="tel" name="phone" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Address') }}</label>
                        <textarea name="address" class="form-control" rows="3"></textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('customer.customers_list') }}" class="btn btn-secondary">{{ _('Cancel') }}</a>
                        <button type="submit" class="btn btn-primary">{{ _('Create Customer') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
