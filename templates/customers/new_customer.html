{% extends "base.html" %}

{% block title %}{{ _('New Customer') }} - {{ shop_info.shop_name if shop_info and shop_info.shop_name else _('Repair Shop') }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow-sm">
            <div class="card-header ">
                <h5 class="mb-0">{{ _('Add New Customer') }}</h5>
            </div>
            <div class="card-body">
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="name" class="form-label">{{ _('Full Name') }} *</label>
                        <input type="text" id="name" name="name" class="form-control" required autofocus autocomplete="name" placeholder="{{ _('e.g., John Doe') }}">
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">{{ _('Phone Number') }} *</label>
                        <input type="tel" id="phone" name="phone" class="form-control" required autocomplete="tel" placeholder="{{ _('e.g., +1 555-0123') }}">
                    </div>
                    <div class="mb-3">
                        <label for="address" class="form-label">{{ _('Address') }}</label>
                        <textarea id="address" name="address" class="form-control" rows="3" placeholder="{{ _('Customer\'s physical address') }}"></textarea>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('customer.customers_list') }}" class="btn btn-outline-secondary px-4">{{ _('Cancel') }}</a>
                        <button type="submit" class="btn btn-outline-primary px-4">{{ _('Create Customer') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
