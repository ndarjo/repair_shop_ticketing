{% extends "base.html" %}

{% block title %}{{ _('Login') }} - Repair Shop{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card mt-5 shadow">
            <div class="card-body">
                <div class="text-center mb-4">
                    <h3>🛠️ {{ _('Staff Login') }}</h3>
                    <p class="text-muted">{{ _('Enter credentials to continue') }}</p>
                </div>
                <form method="POST">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label class="form-label">{{ _('Username') }}</label>
                        <input type="text" name="username" class="form-control" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">{{ _('Password') }}</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">{{ _('Sign In') }}</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
