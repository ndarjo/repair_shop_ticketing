{% extends "base.html" %}
{% block title %}{{ _('404 Not Found') }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-primary mb-4"><i class="fas fa-search"></i></div>
        <h1 class="display-4">{{ _('Page Not Found') }}</h1>
        <p class="lead text-muted mb-5">
            {{ _("Oops! The page you are looking for doesn't exist or has been moved.") }}
        </p>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-home me-2"></i>{{ _('Back to Dashboard') }}
        </a>
    </div>
</div>
{% endblock %}
