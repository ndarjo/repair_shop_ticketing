{% extends "base.html" %}
{% block title %}{{ _('500 System Error') }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-warning mb-4"><i class="fas fa-tools"></i></div>
        <h1 class="display-4">{{ _('Something Went Wrong') }}</h1>
        <p class="lead text-muted mb-5">
            {{ _("The server encountered an unexpected error. Our technical team has been notified (check the logs).") }}
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <button id="reloadPageBtn" class="btn btn-warning btn-lg px-4">
                <i class="fas fa-redo me-2"></i>{{ _('Retry Request') }}
            </button>
            <a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary btn-lg px-4">{{ _('Dashboard') }}</a>
        </div>
    </div>
</div>
{% endblock %}
