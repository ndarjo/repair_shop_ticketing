{% extends "base.html" %}
{% block title %}{{ _('403 Forbidden') }}{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 text-center">
        <div class="display-1 text-danger mb-4"><i class="fas fa-shield-alt"></i></div>
        <h1 class="display-4">{{ _('Access Denied') }}</h1>
        <p class="lead text-muted mb-5">
            {{ _("Sorry, you don't have the required permissions to access this page or perform this action.") }}
        </p>
        <a href="{{ url_for('main.dashboard') }}" class="btn btn-primary btn-lg px-5">
            <i class="fas fa-home me-2"></i>{{ _('Return to Dashboard') }}
        </a>
    </div>
</div>
{% endblock %}
