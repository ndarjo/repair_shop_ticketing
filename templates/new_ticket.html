{% extends "base.html" %}

{% block title %}Create Ticket - Repair Shop{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4>Create New Repair Ticket</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <h5 class="mb-3">Customer & Device Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="customer_id" class="form-label">Customer *</label>
                            <select class="form-control" id="customer_id" name="customer_id" required onchange="loadDevices(this.value)">
                                <option value="">Select Customer</option>
                                {% for customer in customers %}
                                <option value="{{ customer.id }}">{{ customer.name }} - {{ customer.phone }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="device_id" class="form-label">Device *</label>
                            <select class="form-control" id="device_id" name="device_id" required>
                                <option value="">Select Device</option>
                            </select>
                        </div>
                    </div>

                    <!-- Date and Time - Auto filled -->
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="created_date" class="form-label">Date *</label>
                            <input type="date" class="form-control" id="created_date" name="created_date" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="created_time" class="form-label">Time *</label>
                            <input type="time" class="form-control" id="created_time" name="created_time" required>
                        </div>
                    </div>

                    <h5 class="mb-3 mt-4">Device Inclusions & Problem</h5>
                    <div class="mb-3">
                        <label for="items_included" class="form-label">Items Included *</label>
                        <textarea class="form-control" id="items_included" name="items_included" rows="2" placeholder="What did customer bring with device? (e.g., Charger, Cable, Box, Accessories)" required></textarea>
                    </div>
                    <div class="mb-3">
                        <label for="problem_description" class="form-label">Problem Description *</label>
                        <textarea class="form-control" id="problem_description" name="problem_description" rows="4" placeholder="What is the problem with the device?" required></textarea>
                    </div>

                    <h5 class="mb-3 mt-4">Ticket Details</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="priority" class="form-label">Priority</label>
                            <select class="form-control" id="priority" name="priority">
                                {% for priority in ['Low', 'Medium', 'High', 'Urgent'] %}
                                <option value="{{ priority }}" {% if priority == 'Medium' %}selected{% endif %}>{{ priority }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="assigned_to" class="form-label">Assign To Technician</label>
                            <select class="form-control" id="assigned_to" name="assigned_to">
                                <option value="">Unassigned</option>
                                {% for user in users %}
                                <option value="{{ user.id }}">{{ user.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Create Ticket</button>
                        <a href="{{ url_for('main.dashboard') }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
// Auto-fill current date and time
window.addEventListener('DOMContentLoaded', function() {
    const now = new Date();
    document.getElementById('created_date').value = now.toISOString().split('T')[0];
    document.getElementById('created_time').value = now.toTimeString().slice(0, 5);
});

function loadDevices(customerId) {
    const deviceSelect = document.getElementById('device_id');
    deviceSelect.innerHTML = '<option value="">Select Device</option>';
    
    if (customerId) {
        fetch(`/admin/get-devices/${customerId}`)
            .then(response => response.json())
            .then(devices => {
                devices.forEach(device => {
                    const option = document.createElement('option');
                    option.value = device.id;
                    option.textContent = device.display;
                    deviceSelect.appendChild(option);
                });
            })
            .catch(error => console.error('Error loading devices:', error));
    }
}
</script>
{% endblock %}
