{% extends "base.html" %}

{% block title %}Add Device - Repair Shop{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <div class="card">
            <div class="card-header">
                <h4>Add Device for {{ customer.name }}</h4>
            </div>
            <div class="card-body">
                <form method="POST">
                    <h5 class="mb-3">Basic Information</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="device_type" class="form-label">Device Type *</label>
                            <input type="text" class="form-control" id="device_type" name="device_type" placeholder="e.g., Smartphone, Laptop, Tablet" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="brand" class="form-label">Brand *</label>
                            <input type="text" class="form-control" id="brand" name="brand" placeholder="e.g., Apple, Samsung" required>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="model" class="form-label">Model</label>
                            <input type="text" class="form-control" id="model" name="model" placeholder="e.g., iPhone 13 Pro">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="model_number" class="form-label">Model Number</label>
                            <input type="text" class="form-control" id="model_number" name="model_number" placeholder="e.g., A2635">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="color" class="form-label">Color</label>
                            <input type="text" class="form-control" id="color" name="color" placeholder="e.g., Black, Silver">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="serial_number" class="form-label">Serial Number</label>
                            <input type="text" class="form-control" id="serial_number" name="serial_number">
                        </div>
                    </div>

                    <h5 class="mb-3 mt-4">Hardware Specifications</h5>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="cpu" class="form-label">CPU/Processor</label>
                            <input type="text" class="form-control" id="cpu" name="cpu" placeholder="e.g., Intel Core i7, Apple M1">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="ram" class="form-label">RAM</label>
                            <input type="text" class="form-control" id="ram" name="ram" placeholder="e.g., 8GB, 16GB, 32GB">
                        </div>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="storage_type" class="form-label">Storage Type</label>
                            <select class="form-control" id="storage_type" name="storage_type">
                                <option value="">Select Storage Type</option>
                                <option value="HDD">HDD (Hard Drive)</option>
                                <option value="SSD">SSD (Solid State Drive)</option>
                                <option value="Both">Both (HDD + SSD)</option>
                                <option value="Flash">Flash Storage</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="storage_capacity" class="form-label">Storage Capacity</label>
                            <input type="text" class="form-control" id="storage_capacity" name="storage_capacity" placeholder="e.g., 256GB SSD, 512GB HDD + 1TB SSD">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="notes" class="form-label">Additional Notes</label>
                        <textarea class="form-control" id="notes" name="notes" rows="3"></textarea>
                    </div>

                    <div class="mb-3">
                        <button type="submit" class="btn btn-primary">Add Device</button>
                        <a href="{{ url_for('customer.view_customer', customer_id=customer.id) }}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
